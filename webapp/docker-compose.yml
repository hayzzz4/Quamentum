services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: quamentum
      POSTGRES_PASSWORD: quamentum_dev
      POSTGRES_DB: quamentum
    ports:
      - "5433:5432"
    volumes:
      - quamentum_pg_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d

volumes:
  quamentum_pg_data:
